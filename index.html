<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#15110c" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#f3ebda" media="(prefers-color-scheme: light)" />
  <meta name="description" content="A Harmony of the Gospels — walk through 211 events in the life of Christ with all parallel passages side by side." />
  <title>Harmony of the Gospels</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Spectral:ital,wght@0,300;0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet" />

  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icons/icon-180.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-theme="auto">
  <div class="grain" aria-hidden="true"></div>

  <!-- ===================== APP BAR ===================== -->
  <header class="appbar">
    <a class="brand" href="#top" aria-label="Harmony of the Gospels — home">
      <span class="brand__mark" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.4">
          <path d="M12 2.5v19M5 8.5h14" stroke-linecap="round"/>
          <circle cx="12" cy="13.5" r="6.2" opacity="0.45"/>
        </svg>
      </span>
      <span class="brand__text">
        <span class="brand__title">Harmony</span>
        <span class="brand__sub">of the Gospels</span>
      </span>
    </a>

    <div class="appbar__actions">
      <label class="version" title="Bible translation">
        <span class="version__caret" aria-hidden="true">&#9662;</span>
        <select id="versionSelect" aria-label="Bible translation">
          <option value="kjv">King James (KJV)</option>
          <option value="web">World English (WEB)</option>
          <option value="webbe">WEB British (WEBBE)</option>
          <option value="asv">American Standard (ASV)</option>
          <option value="bbe">Basic English (BBE)</option>
          <option value="dra">Douay-Rheims (DRA)</option>
          <option value="darby">Darby Bible</option>
          <option value="ylt">Young's Literal (YLT)</option>
          <option value="oeb-us">Open English US (OEB)</option>
          <option value="oeb-cw">Open English CW (OEB)</option>
        </select>
      </label>

      <button id="syncBtn" class="iconbtn iconbtn--sync" type="button" title="Sync across devices" aria-label="Sync across devices">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12a9 9 0 0 1-15.5 6.3L3 16"/><path d="M3 12A9 9 0 0 1 18.5 5.7L21 8"/>
          <path d="M21 4v4h-4"/><path d="M3 20v-4h4"/>
        </svg>
        <span class="iconbtn__dot" id="syncDot" hidden></span>
      </button>

      <button id="themeBtn" class="iconbtn" type="button" title="Toggle light / dark" aria-label="Toggle light or dark theme">
        <svg class="ic-sun" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
          <circle cx="12" cy="12" r="4.2"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>
        </svg>
        <svg class="ic-moon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 13.5A8 8 0 1 1 10.5 4a6.2 6.2 0 0 0 9.5 9.5Z"/>
        </svg>
      </button>

      <button id="tocBtn" class="iconbtn" type="button" title="Browse all events" aria-label="Browse all events" aria-expanded="false">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
          <path d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      </button>
    </div>

    <div class="progressbar" aria-hidden="true"><span id="progressFill"></span></div>
  </header>

  <!-- ===================== READER ===================== -->
  <main class="reader" id="top">
    <section class="now" aria-live="polite">
      <p class="now__eyebrow" id="group"></p>
      <div class="now__head">
        <span class="now__num" id="numBadge"></span>
        <h1 class="now__title" id="label"></h1>
      </div>
      <p class="now__refs" id="refSummary"></p>

      <div class="now__meta">
        <button id="readToggle" class="readtoggle js-readtoggle" type="button" aria-pressed="false">
          <span class="readtoggle__box" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
          </span>
          <span class="readtoggle__label">Mark as read</span>
        </button>
        <span class="now__count" id="position"></span>
      </div>
    </section>

    <div class="passages" id="passages"></div>

    <section class="notes" id="notes">
      <div class="notes__head">
        <h2 class="notes__title">
          <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
          My notes
        </h2>
        <span class="notes__status" id="notesStatus" aria-live="polite"></span>
      </div>
      <textarea id="noteArea" class="notes__area" rows="4"
        placeholder="Write a reflection, prayer, question, or cross-reference for this event&#8230;"
        aria-label="Notes for this event"></textarea>
    </section>

    <p class="status" id="status" role="status"></p>

    <div class="readtoggle-bar">
      <button class="readtoggle readtoggle--lg js-readtoggle" type="button" aria-pressed="false">
        <span class="readtoggle__box" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
        </span>
        <span class="readtoggle__label">Mark as read</span>
      </button>
    </div>

    <nav class="controls" aria-label="Reading navigation">
      <button id="prevBtn" class="navbtn navbtn--prev" type="button">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        <span>Previous</span>
      </button>

      <div class="controls__center">
        <form id="jumpForm" class="jump">
          <label for="jumpInput" class="jump__label">Go to</label>
          <input id="jumpInput" class="jump__input" type="number" min="1" inputmode="numeric" placeholder="#" />
          <button id="jumpBtn" class="jump__go" type="submit">Go</button>
        </form>
        <button id="openOnlineBtn" class="linkbtn" type="button" title="Open this reference on BibleGateway">
          Read on BibleGateway &#8599;
        </button>
      </div>

      <button id="nextBtn" class="navbtn navbtn--next" type="button">
        <span>Next</span>
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
      </button>
    </nav>
  </main>

  <footer class="foot">
    <span id="footProgress"></span>
    <span class="foot__sep">&middot;</span>
    <span>Texts fetched live from <a href="https://bible-api.com" target="_blank" rel="noopener">bible-api.com</a></span>
  </footer>

  <!-- ===================== TOC DRAWER ===================== -->
  <div class="scrim" id="scrim" hidden></div>
  <aside class="drawer" id="drawer" aria-label="Table of contents" aria-hidden="true">
    <div class="drawer__head">
      <div>
        <h2 class="drawer__title">The Journey</h2>
        <p class="drawer__sub" id="drawerProgress"></p>
      </div>
      <button id="drawerClose" class="iconbtn" type="button" aria-label="Close">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="drawer__search">
      <input id="tocSearch" type="search" placeholder="Search events&#8230;" aria-label="Search events" />
    </div>
    <div class="drawer__list" id="tocList"></div>
  </aside>

  <!-- ===================== SYNC SHEET ===================== -->
  <div class="scrim" id="syncScrim" hidden></div>
  <div class="sheet" id="syncSheet" role="dialog" aria-modal="true" aria-labelledby="syncSheetTitle" aria-hidden="true">
    <button id="syncSheetClose" class="iconbtn sheet__close" type="button" aria-label="Close">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
    </button>
    <h2 id="syncSheetTitle" class="sheet__title">Sync across devices</h2>
    <p class="sheet__body" id="syncBody">
      Sign in once on your phone and laptop to keep your place, your translation,
      and every event you&rsquo;ve marked read perfectly in step.
    </p>
    <button id="googleBtn" class="googlebtn" type="button">
      <svg viewBox="0 0 18 18" width="18" height="18" aria-hidden="true"><path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.8 2.72v2.26h2.92c1.7-1.57 2.68-3.88 2.68-6.62Z"/><path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.92-2.26c-.8.54-1.84.86-3.04.86-2.34 0-4.32-1.58-5.03-3.7H.96v2.33A9 9 0 0 0 9 18Z"/><path fill="#FBBC05" d="M3.97 10.72a5.4 5.4 0 0 1 0-3.44V4.95H.96a9 9 0 0 0 0 8.1l3.01-2.33Z"/><path fill="#EA4335" d="M9 3.58c1.32 0 2.5.45 3.44 1.35l2.58-2.58A9 9 0 0 0 .96 4.95l3.01 2.33C4.68 5.16 6.66 3.58 9 3.58Z"/></svg>
      <span>Sign in with Google</span>
    </button>
    <p class="sheet__status" id="syncStatus"></p>
    <p class="sheet__hint" id="syncHint"></p>
  </div>

  <div class="toast" id="toast" hidden></div>

  <script type="module" src="firebase-config.js"></script>
  <script type="module" src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(()=>{}));
    }
  </script>
</body>
</html>
